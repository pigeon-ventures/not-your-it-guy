services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: mssvcacc
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nyig_local}
      POSTGRES_DB: msmock
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mssvcacc -d msmock"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
